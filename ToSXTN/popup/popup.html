<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Termshift</title>
  <style>
    :root {
      --bg-primary:   #0f172a;
      --bg-surface:   #1e293b;
      --bg-card:      #263548;
      --accent:       #3b82f6;
      --accent-hover: #2563eb;
      --text-primary: #f1f5f9;
      --text-muted:   #94a3b8;
      --border:       #334155;
      --risk-critical:#ef4444;
      --risk-high:    #f97316;
      --risk-med:     #f59e0b;
      --risk-low:     #22c55e;
      --radius-card:  10px;
      --radius-btn:   6px;
      --radius-input: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 320px;
      min-height: 180px;
    }
    .view { padding: 20px; }
    .logo { font-size: 17px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
    .subtitle { font-size: 11px; color: var(--text-muted); margin-bottom: 18px; }

    /* Auth view */
    .auth-heading { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text-primary); }
    label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      padding: 8px 10px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,.2); }

    /* Buttons */
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-btn);
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: default; }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      background: #ffffff;
      color: #3c4043;
      border: 1px solid #dadce0;
      border-radius: var(--radius-btn);
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 13px;
    }
    .btn-google:hover:not(:disabled) { background: #f8f9fa; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
    .btn-google:disabled { opacity: 0.6; cursor: default; }

    .or-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 13px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .or-sep::before, .or-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .error-msg {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius-btn);
      padding: 8px 10px;
      font-size: 12px;
      color: #fca5a5;
      margin-top: 10px;
    }

    /* Main view */
    .main-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .user-email { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .btn-link {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      margin-top: 3px;
      white-space: nowrap;
    }
    .btn-link:hover { color: var(--text-primary); }

    /* Spinner */
    .spinner-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--bg-surface);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label { font-size: 13px; color: var(--text-muted); }

    /* Results */
    .results-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 13px;
      margin-top: 12px;
    }
    .verdict-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .risk-count { font-size: 12px; color: var(--text-muted); }
    .sev-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .sev-HIGH { background: #450a0a; color: #fca5a5; }
    .sev-MED  { background: #451a03; color: #fcd34d; }
    .sev-LOW  { background: #052e16; color: #86efac; }

    .span-list { border-top: 1px solid var(--bg-primary); margin-top: 6px; padding-top: 6px; }
    .span-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
      color: var(--text-primary);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .more-label { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    .btn-report {
      display: block;
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-btn);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      margin-top: 12px;
    }
    .btn-report:hover { background: var(--accent-hover); }

    .reset-link {
      display: block;
      text-align: center;
      margin-top: 9px;
      font-size: 11px;
      color: var(--border);
      cursor: pointer;
    }
    .reset-link:hover { color: var(--text-muted); }

    .error-result {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius-btn);
      padding: 10px;
      font-size: 12px;
      color: #fca5a5;
      margin-top: 12px;
      line-height: 1.4;
    }

    /* ── Unified header ── */
    .ts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .ts-wordmark {
      font-size: 21px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .ts-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .ts-status-dot.authenticated { background: var(--risk-low); }
    .ts-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ts-greeting {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .ts-signout-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 5px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }
    .ts-signout-btn:hover { color: var(--text-primary); background: var(--bg-surface); }

    /* ── Enhanced analyze button ── */
    .btn-analyze {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 16px;
      font-size: 14px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-analyze:active:not(:disabled) { transform: scale(0.98); }

    /* ── Auth footer ── */
    .auth-footer {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── Inline button spinner ── */
    .btn-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
  </style>
</head>
<body>

  <!-- Auth view -->
  <div id="auth-view" class="view">
    <div class="ts-header">
      <span class="ts-wordmark">Termshift</span>
      <span class="ts-status-dot"></span>
    </div>
    <div class="auth-heading">Sign in to your account</div>

    <button id="google-btn" class="btn-google">
      <svg width="17" height="17" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908C16.657 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span id="google-btn-label">Sign in with Google</span>
    </button>

    <div class="or-sep">or</div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" id="signin-btn"><span id="signin-btn-content">Sign In</span></button>
    <div class="error-msg" id="auth-error" style="display:none"></div>
    <div class="auth-footer">
      Don't have an account? <a href="https://termshift.com/signup" target="_blank" rel="noopener">Sign up</a>
    </div>
  </div>

  <!-- Main view -->
  <div id="main-view" class="view" style="display:none">
    <div class="ts-header">
      <div>
        <span class="ts-wordmark">Termshift</span>
        <div class="ts-greeting">Hi <span id="user-greeting">there</span></div>
      </div>
      <div class="ts-header-right">
        <span class="ts-status-dot authenticated"></span>
        <button class="ts-signout-btn" id="logout-btn" title="Sign out">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary btn-analyze" id="analyze-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Analyze This Page
    </button>

    <div class="spinner-row" id="spinner-row" style="display:none">
      <div class="spinner"></div>
      <span class="spinner-label">Analyzing page…</span>
    </div>

    <div id="results-area"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
